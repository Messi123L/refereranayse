<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface API Gemini</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 800px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.9em;
        }

        .api-key-section {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }

        .api-key-section label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .api-key-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .api-key-input:focus {
            outline: none;
            border-color: #4285f4;
        }

        .chat-section {
            padding: 30px;
        }

        .chat-messages {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            background: #fafafa;
        }

        .message {
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 8px;
            line-height: 1.5;
        }

        .user-message {
            background: #e3f2fd;
            margin-left: 20%;
            border-left: 4px solid #4285f4;
        }

        .assistant-message {
            background: #f1f8e9;
            margin-right: 20%;
            border-left: 4px solid #34a853;
        }

        .system-message {
            background: #fff3cd;
            text-align: center;
            font-style: italic;
            color: #856404;
        }

        .input-section {
            display: flex;
            gap: 10px;
        }

        .message-input {
            flex: 1;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            resize: none;
            font-family: inherit;
        }

        .message-input:focus {
            outline: none;
            border-color: #4285f4;
        }

        .send-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(66, 133, 244, 0.4);
        }

        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: #f8d7da !important;
            color: #721c24;
            border-left-color: #dc3545 !important;
        }

        @media (max-width: 600px) {
            .user-message, .assistant-message {
                margin-left: 0;
                margin-right: 0;
            }
            
            .input-section {
                flex-direction: column;
            }
            
            .send-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Interface API Gemini</h1>
            <p>Discutez avec l'IA de Google en temps réel</p>
        </div>

        <div class="api-key-section">
            <label for="apiKey">Clé API Gemini :</label>
            <input 
                type="password" 
                id="apiKey" 
                class="api-key-input" 
                placeholder="Collez votre clé API Gemini ici (commence par AIza...)"
            >
        </div>

        <div class="chat-section">
            <div class="chat-messages" id="chatMessages">
                <div class="message system-message">
                    Entrez votre clé API Gemini ci-dessus pour commencer la conversation.
                </div>
            </div>

            <div class="input-section">
                <textarea 
                    id="messageInput" 
                    class="message-input" 
                    rows="3" 
                    placeholder="Écrivez votre message ici..."
                    disabled
                ></textarea>
                <button id="sendBtn" class="send-btn" disabled>
                    Envoyer
                </button>
            </div>
        </div>
    </div>

    <script>
        // Éléments du DOM
        const apiKeyInput = document.getElementById('apiKey');
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        // Historique de conversation
        let conversationHistory = [];

        // Vérifier si une clé API est saisie
        apiKeyInput.addEventListener('input', () => {
            const hasApiKey = apiKeyInput.value.trim().length > 0;
            messageInput.disabled = !hasApiKey;
            sendBtn.disabled = !hasApiKey;
            
            if (hasApiKey) {
                addSystemMessage("✅ Clé API détectée. Vous pouvez maintenant envoyer des messages !");
            }
        });

        // Envoyer un message
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const message = messageInput.value.trim();
            const apiKey = apiKeyInput.value.trim();

            if (!message || !apiKey) return;

            // Ajouter le message utilisateur à l'interface
            addUserMessage(message);
            messageInput.value = '';
            
            // Désactiver le bouton pendant l'envoi
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="loading"></span>';

            // Ajouter à l'historique
            conversationHistory.push({
                role: "user",
                parts: [{ text: message }]
            });

            try {
                // Appel à l'API Gemini
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        contents: conversationHistory,
                        generationConfig: {
                            temperature: 0.7,
                            topK: 40,
                            topP: 0.95,
                            maxOutputTokens: 1024,
                        }
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || 'Erreur lors de l\'appel API');
                }

                const data = await response.json();
                
                // Extraire la réponse de Gemini
                const assistantResponse = data.candidates[0].content.parts[0].text;
                
                // Ajouter la réponse à l'interface
                addAssistantMessage(assistantResponse);
                
                // Ajouter à l'historique
                conversationHistory.push({
                    role: "model",
                    parts: [{ text: assistantResponse }]
                });

            } catch (error) {
                addErrorMessage(`❌ Erreur: ${error.message}`);
                // Retirer le dernier message utilisateur en cas d'erreur
                conversationHistory.pop();
            } finally {
                // Réactiver le bouton
                sendBtn.disabled = false;
                sendBtn.innerHTML = 'Envoyer';
                messageInput.focus();
            }
        }

        function addUserMessage(text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message user-message';
            messageDiv.textContent = text;
            chatMessages.appendChild(messageDiv);
            scrollToBottom();
        }

        function addAssistantMessage(text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant-message';
            // Convertir les sauts de ligne en balises <br>
            messageDiv.innerHTML = text.replace(/\n/g, '<br>');
            chatMessages.appendChild(messageDiv);
            scrollToBottom();
        }

        function addSystemMessage(text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message system-message';
            messageDiv.textContent = text;
            chatMessages.appendChild(messageDiv);
            scrollToBottom();
        }

        function addErrorMessage(text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message system-message error';
            messageDiv.textContent = text;
            chatMessages.appendChild(messageDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Focus sur le champ de saisie au chargement
        window.addEventListener('load', () => {
            apiKeyInput.focus();
        });
    </script>
</body>
</html>
